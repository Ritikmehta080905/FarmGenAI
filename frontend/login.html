<!DOCTYPE html>
<html>
<head>
  <title>Login | AgriNegotiator</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-container { max-width: 400px; margin: 60px auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); padding: 32px; }
    .login-container h2 { text-align: center; margin-bottom: 24px; }
    .login-container input { width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 6px; border: 1px solid #ccc; }
    .login-container button { width: 100%; padding: 12px; background: #4CAF50; color: #fff; border: none; border-radius: 6px; font-size: 16px; }
    .login-container .signup-link { text-align: center; margin-top: 16px; }
    @media (max-width: 600px) { .login-container { padding: 16px; } }
  </style>
  <script>
    function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      // Simulate login (replace with backend call)
      const user = localStorage.getItem('user');
      if (!user) {
        alert('No account found. Please sign up.');
        return;
      }
      const userObj = JSON.parse(user);
      if (userObj.username !== username) {
        alert('Incorrect username.');
        return;
      }
      // Password check skipped for demo
      window.location.href = 'index.html';
    }
  </script>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form onsubmit="handleLogin(event)">
      <input id="login-username" type="text" placeholder="Username" required>
      <input id="login-password" type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <div class="signup-link">
      <a href="signup.html">Don't have an account? Sign up</a>
    </div>
  </div>
</body>
</html>
