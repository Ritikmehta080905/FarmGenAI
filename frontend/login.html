<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login � AgriNegotiator</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body>
<div id="toast-container"></div>

<nav class="nav">
  <div class="nav-brand">
    <a href="index.html" style="display:flex;align-items:center;gap:.75rem">
      <span class="leaf">??</span>
      <span class="appname">Agri<span>Negotiator</span></span>
    </a>
  </div>
</nav>

<div class="form-page">
  <div class="form-wrap auth-form-wrap">

    <div class="form-hdr">
      <div class="form-hdr-icon">??</div>
      <h1>Welcome back</h1>
      <p>Sign in to your AgriNegotiator account</p>
    </div>

    <div class="form-card">
      <form id="loginForm" novalidate>

        <div class="form-group" style="margin-bottom:1.25rem">
          <label for="login-email" class="form-label">Email <span class="req">*</span></label>
          <div class="inp-wrap">
            <span class="inp-icon">??</span>
            <input class="form-input" id="login-email" type="email"
                   placeholder="Enter your email" autocomplete="username" required>
          </div>
          <div class="field-err" id="err-email" style="display:none">?? Please enter your email</div>
        </div>

        <div class="form-group" style="margin-bottom:1.5rem">
          <label for="login-password" class="form-label">Password <span class="req">*</span></label>
          <div class="inp-wrap">
            <span class="inp-icon">??</span>
            <input class="form-input" id="login-password" type="password"
                   placeholder="Enter your password" autocomplete="current-password" required>
          </div>
          <div class="field-err" id="err-password" style="display:none">?? Please enter your password</div>
        </div>

        <div class="form-group" style="margin-bottom:1.5rem">
          <label for="login-role" class="form-label">Login As <span class="req">*</span></label>
          <div class="inp-wrap">
            <span class="inp-icon">??</span>
            <select class="form-input" id="login-role" required>
              <option value="">Select your role</option>
              <option value="farmer">Farmer</option>
              <option value="buyer">Buyer</option>
              <option value="warehouse">Warehouse Manager</option>
              <option value="transporter">Transporter</option>
              <option value="processor">Processor</option>
              <option value="compost">Compost / Animal Farm</option>
            </select>
          </div>
          <div class="field-err" id="err-role" style="display:none">?? Please select a role</div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-submit" id="loginBtn">? Sign In</button>
        </div>
      </form>

      <div class="divider"></div>

      <p style="text-align:center;font-size:.85rem;color:var(--text-secondary)">
        Don't have an account?
        <a href="signup.html" style="color:var(--green-500);font-weight:600">Sign up free</a>
      </p>
      <p style="text-align:center;margin-top:.5rem">
        <a href="farmer_form.html" style="color:var(--text-muted);font-size:.8rem">
          Skip login ? List produce directly
        </a>
      </p>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();

  var email = (document.getElementById('login-email').value || '').trim().toLowerCase();
  var p     = (document.getElementById('login-password').value || '');
  var selectedRole = document.getElementById('login-role').value;
  var eErr  = document.getElementById('err-email');
  var pErr = document.getElementById('err-password');
  var rErr = document.getElementById('err-role');
  var ok   = true;
  var emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

  if (!emailOk) { eErr.style.display = 'flex'; ok = false; } else { eErr.style.display = 'none'; }
  if (!p) { pErr.style.display = 'flex'; ok = false; } else { pErr.style.display = 'none'; }
  if (!selectedRole) { rErr.style.display = 'flex'; ok = false; } else { rErr.style.display = 'none'; }
  if (!ok) return;

  fetch(API_BASE + '/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, password: p })
  })
  .then(async function(res) {
    var data = await res.json().catch(function() { return {}; });
    if (!res.ok) {
      throw new Error(data.detail || 'Login failed');
    }
    return data;
  })
  .then(function(user) {
    var roles = JSON.parse(localStorage.getItem('agri_user_roles') || '{}');
    var role = selectedRole || roles[email] || 'farmer';
    roles[email] = role;
    localStorage.setItem('agri_user_roles', JSON.stringify(roles));

    localStorage.setItem('agri_session', JSON.stringify({
      user_id: user.user_id,
      name: user.name,
      email: user.email,
      role: role
    }));

    localStorage.removeItem('latestNegotiationId');

    showToast('success', 'Logged in!', 'Welcome back, ' + user.name);
    setTimeout(function() {
      if (role === 'farmer') { window.location.href = 'farmer_form.html'; }
      else if (role === 'buyer') { window.location.href = 'buyer_offer_form.html'; }
      else { window.location.href = 'role_offer_form.html'; }
    }, 700);
  })
  .catch(function(err) {
    showToast('error', 'Login failed', err.message);
  });
});
</script>
</body>
</html>
