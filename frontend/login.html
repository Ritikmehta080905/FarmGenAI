<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AgriNegotiator</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body>
<div id="toast-container"></div>

<nav class="nav">
  <div class="nav-brand">
    <a href="index.html" style="display:flex;align-items:center;gap:.75rem">
      <span class="leaf">??</span>
      <span class="appname">Agri<span>Negotiator</span></span>
    </a>
  </div>
</nav>

<div class="form-page">
  <div class="form-wrap auth-form-wrap">

    <div class="form-hdr">
      <div class="form-hdr-icon">??</div>
      <h1>Welcome back</h1>
      <p>Sign in to your AgriNegotiator account</p>
    </div>

    <div class="form-card">
      <form id="loginForm" novalidate>

        <div class="form-group" style="margin-bottom:1.25rem">
          <label for="login-username" class="form-label">Username <span class="req">*</span></label>
          <div class="inp-wrap">
            <span class="inp-icon">??</span>
            <input class="form-input" id="login-username" type="text"
                   placeholder="Enter your username" autocomplete="username" required>
          </div>
          <div class="field-err" id="err-username" style="display:none">?? Please enter your username</div>
        </div>

        <div class="form-group" style="margin-bottom:1.5rem">
          <label for="login-password" class="form-label">Password <span class="req">*</span></label>
          <div class="inp-wrap">
            <span class="inp-icon">??</span>
            <input class="form-input" id="login-password" type="password"
                   placeholder="Enter your password" autocomplete="current-password" required>
          </div>
          <div class="field-err" id="err-password" style="display:none">?? Please enter your password</div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-submit" id="loginBtn">? Sign In</button>
        </div>
      </form>

      <div class="divider"></div>

      <p style="text-align:center;font-size:.85rem;color:var(--text-secondary)">
        Don't have an account?
        <a href="signup.html" style="color:var(--green-500);font-weight:600">Sign up free</a>
      </p>
      <p style="text-align:center;margin-top:.5rem">
        <a href="farmer_form.html" style="color:var(--text-muted);font-size:.8rem">
          Skip login ? List produce directly
        </a>
      </p>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();

  var u    = (document.getElementById('login-username').value || '').trim();
  var p    = (document.getElementById('login-password').value || '');
  var uErr = document.getElementById('err-username');
  var pErr = document.getElementById('err-password');
  var ok   = true;

  if (!u) { uErr.style.display = 'flex'; ok = false; } else { uErr.style.display = 'none'; }
  if (!p) { pErr.style.display = 'flex'; ok = false; } else { pErr.style.display = 'none'; }
  if (!ok) return;

  /* Retrieve account stored by signup.html */
  var stored = localStorage.getItem('agri_user');
  if (!stored) {
    showToast('error', 'No account found', 'Please sign up first.');
    return;
  }

  var user = JSON.parse(stored);
  if (user.username !== u) {
    showToast('error', 'Incorrect username', 'Username does not match the registered account.');
    return;
  }
  if (user.password && user.password !== p) {
    showToast('error', 'Wrong password', 'Please try again.');
    return;
  }

  /* Store session */
  localStorage.setItem('agri_session', JSON.stringify({ username: u, role: user.role }));
  showToast('success', 'Logged in!', 'Welcome back, ' + u);
  setTimeout(function() {
    var role = user.role;
    if (role === 'farmer') { window.location.href = 'farmer_form.html'; }
    else                   { window.location.href = 'dashboard.html?role=' + role; }
  }, 700);
});
</script>
</body>
</html>
