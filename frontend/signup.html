<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - AgriNegotiator</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body>
<div id="toast-container"></div>

<nav class="nav">
  <div class="nav-brand">
    <a href="index.html" style="display:flex;align-items:center;gap:.75rem">
      <span class="leaf">&#127807;</span>
      <span class="appname">Agri<span>Negotiator</span></span>
    </a>
  </div>
</nav>

<div class="form-page">
  <div class="form-wrap auth-form-wrap">

    <div class="form-hdr">
      <div class="form-hdr-icon">&#128640;</div>
      <h1>Create account</h1>
      <p>Join AgriNegotiator and start trading smarter</p>
    </div>

    <div class="form-card">
      <form id="signupForm" novalidate>

        <div class="form-group" style="margin-bottom:1.25rem">
          <label for="signup-name" class="form-label">Full Name <span class="req">*</span></label>
          <div class="inp-wrap">
            <span class="inp-icon">&#128100;</span>
            <input class="form-input" id="signup-name" type="text"
                   placeholder="Enter your full name" autocomplete="name" required>
          </div>
          <div class="field-err" id="err-name" style="display:none">&#9888; Please enter your name</div>
        </div>

        <div class="form-group" style="margin-bottom:1.25rem">
          <label for="signup-email" class="form-label">Email <span class="req">*</span></label>
          <div class="inp-wrap">
            <span class="inp-icon">&#9993;</span>
            <input class="form-input" id="signup-email" type="email"
                   placeholder="you@example.com" autocomplete="email" required>
          </div>
          <div class="field-err" id="err-email" style="display:none">&#9888; Please enter a valid email</div>
        </div>

        <div class="form-group" style="margin-bottom:1.25rem">
          <label for="signup-password" class="form-label">Password <span class="req">*</span></label>
          <div class="inp-wrap">
            <span class="inp-icon">&#128274;</span>
            <input class="form-input" id="signup-password" type="password"
                   placeholder="Create a password (min 4 chars)" autocomplete="new-password" required>
          </div>
          <div class="field-err" id="err-password" style="display:none">&#9888; Password must be at least 4 characters</div>
        </div>

        <div class="form-group" style="margin-bottom:1.5rem">
          <label for="signup-role" class="form-label">Your Role <span class="req">*</span></label>
          <div class="inp-wrap">
            <span class="inp-icon">&#127979;</span>
            <select class="form-input" id="signup-role" required>
              <option value="">Select your role</option>
              <option value="farmer">Farmer</option>
              <option value="buyer">Buyer</option>
              <option value="warehouse">Warehouse Manager</option>
              <option value="transporter">Transporter</option>
              <option value="processor">Processor</option>
              <option value="compost">Compost / Animal Farm</option>
            </select>
          </div>
          <div class="field-err" id="err-role" style="display:none">&#9888; Please select a role</div>
        </div>

        <div class="form-group" style="margin-bottom:1.5rem">
          <label for="signup-location" class="form-label">Location <span class="req">*</span></label>
          <div class="inp-wrap">
            <span class="inp-icon">&#128205;</span>
            <input class="form-input" id="signup-location" type="text"
                   placeholder="City, State" autocomplete="address-level2" required>
          </div>
          <div class="field-err" id="err-location" style="display:none">&#9888; Please enter your location</div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-submit" id="signupBtn">&#10003; Create Account</button>
        </div>
      </form>

      <div class="divider"></div>

      <p style="text-align:center;font-size:.85rem;color:var(--text-secondary)">
        Already have an account?
        <a href="login.html" style="color:var(--green-500);font-weight:600">Sign in</a>
      </p>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('signupForm').addEventListener('submit', function(e) {
  e.preventDefault();

  var name = (document.getElementById('signup-name').value || '').trim();
  var email = (document.getElementById('signup-email').value || '').trim().toLowerCase();
  var password = (document.getElementById('signup-password').value || '');
  var role     = document.getElementById('signup-role').value;
  var location = (document.getElementById('signup-location').value || '').trim();

  var errN = document.getElementById('err-name');
  var errE = document.getElementById('err-email');
  var errP = document.getElementById('err-password');
  var errR = document.getElementById('err-role');
  var errL = document.getElementById('err-location');
  var ok   = true;
  var emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

  if (!name) { errN.style.display = 'flex'; ok = false; } else { errN.style.display = 'none'; }
  if (!emailOk) { errE.style.display = 'flex'; ok = false; } else { errE.style.display = 'none'; }
  if (password.length < 4) { errP.style.display = 'flex'; ok = false; } else { errP.style.display = 'none'; }
  if (!role)     { errR.style.display = 'flex'; ok = false; } else { errR.style.display = 'none'; }
  if (!location) { errL.style.display = 'flex'; ok = false; } else { errL.style.display = 'none'; }
  if (!ok) return;

  var btn  = document.getElementById('signupBtn');
  btn.disabled = true;
  btn.textContent = 'Creating account...';

  fetch(API_BASE + '/auth/signup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name: name,
      email: email,
      password: password,
      location: location,
      language: 'English'
    })
  })
  .then(async function(res) {
    var data = await res.json().catch(function() { return {}; });
    if (!res.ok) {
      throw new Error(data.detail || 'Signup failed');
    }
    return data;
  })
  .then(function(data) {
    var roles = JSON.parse(localStorage.getItem('agri_user_roles') || '{}');
    roles[email] = role;
    localStorage.setItem('agri_user_roles', JSON.stringify(roles));

    localStorage.setItem('agri_session', JSON.stringify({
      user_id: data.user_id,
      name: data.name,
      email: data.email,
      role: role
    }));

    showToast('success', 'Account created!', 'Welcome, ' + data.name + '!');
    setTimeout(function() {
      if (role === 'farmer') { window.location.href = 'farmer_form.html'; }
      else                   { window.location.href = 'dashboard.html?role=' + role; }
    }, 800);
  })
  .catch(function(err) {
    btn.disabled = false;
    btn.textContent = '✓ Create Account';
    showToast('error', 'Signup failed', err.message);
  });
});
</script>
</body>
</html>
