<!--
	NEGOTIATION LOG COMPONENT — AgriNegotiator
	Documents the log entry HTML structure.
	Entries are appended dynamically by negotiation.js via appendLog().

	Types: deal | counter | reject | info | system
-->
<div id="negotiationLog">

	<div class="log-entry system">
		<span class="log-time">10:31:00</span>
		<span class="log-icon">⚡</span>
		<span class="log-text">🚀 Starting negotiation…</span>
	</div>

	<div class="log-entry info">
		<span class="log-time">10:31:01</span>
		<span class="log-icon">💬</span>
		<span class="log-text">FarmerAgent proposes ₹25.00/kg for 500kg Tomatoes</span>
	</div>

	<div class="log-entry counter">
		<span class="log-time">10:31:03</span>
		<span class="log-icon">🔄</span>
		<span class="log-text">BuyerAgent counter-offers ₹22.00/kg</span>
	</div>

	<div class="log-entry deal">
		<span class="log-time">10:31:08</span>
		<span class="log-icon">✅</span>
		<span class="log-text">🏁 Deal accepted at ₹23.00/kg — DEAL</span>
	</div>

</div>
